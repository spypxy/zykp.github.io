<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 药安食养</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Noto Serif SC", "Microsoft YaHei", serif;
}

body {
    background: #f9f6f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.login-container {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    padding: 40px;
    width: 100%;
    max-width: 450px;
    text-align: center;
}

.logo {
    font-size: 28px;
    font-weight: 700;
    color: #2d5a43;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.logo i {
    color: #d4b986;
}

h2 {
    color: #2d5a43;
    margin-bottom: 30px;
    font-size: 24px;
}

.form-group {
    margin-bottom: 20px;
    text-align: left;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #3a3a38;
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: #2d5a43;
    box-shadow: 0 0 0 2px rgba(45, 90, 67, 0.1);
}

.submit-btn {
    width: 100%;
    padding: 12px;
    background: #2d5a43;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.submit-btn:hover {
    background: #1e402f;
    transform: translateY(-2px);
}

.divider {
    margin: 30px 0;
    position: relative;
    text-align: center;
}

.divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #e0e0e0;
    transform: translateY(-50%);
}

.divider span {
    background: #fff;
    padding: 0 20px;
    position: relative;
    color: #777;
    font-size: 14px;
}

.social-login {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
}

.social-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.social-btn:hover {
    transform: translateY(-5px);
}

.social-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 10px;
}

.qq {
    background: #12B7F5;
    color: #fff;
}

.wechat {
    background: #07C160;
    color: #fff;
}

.douyin {
    background: #000;
    color: #fff;
}

.social-text {
    font-size: 14px;
    color: #3a3a38;
}

.footer {
    margin-top: 30px;
    font-size: 14px;
    color: #777;
}

.error-message {
    color: #dc3545;
    font-size: 14px;
    margin-top: 15px;
    display: none;
}

@media (max-width: 480px) {
    .login-container {
        padding: 30px 20px;
    }
    
    .social-login {
        gap: 20px;
    }
    
    .social-icon {
        width: 50px;
        height: 50px;
        font-size: 20px;
    }
}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <i class="fas fa-leaf"></i>
        <span>药安食养</span>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label for="user">账号</label>
            <input type="text" id="user" name="user" required>
        </div>
        <div class="form-group">
            <label for="pwd">密码</label>
            <input type="password" id="pwd" name="pwd" required>
        </div>
        <button type="submit" class="submit-btn">登录</button>
        <div class="error-message" id="errorMessage">账号密码错误</div>
    </form>
    <div class="divider">
        <span>其他登录方式</span>
    </div>
    <div class="social-login">
        <div class="social-btn" onclick="alert('扫码登录功能暂未开放')">
            <div class="social-icon qq">
                <i class="fab fa-qq"></i>
            </div>
            <span class="social-text">QQ</span>
        </div>
        <div class="social-btn" onclick="alert('扫码登录功能暂未开放')">
            <div class="social-icon wechat">
                <i class="fab fa-weixin"></i>
            </div>
            <span class="social-text">微信</span>
        </div>
        <div class="social-btn" onclick="alert('扫码登录功能暂未开放')">
            <div class="social-icon douyin">
                <i class="fab fa-tiktok"></i>
            </div>
            <span class="social-text">抖音</span>
        </div>
    </div>
    <div class="footer">
        © 2020 药安食养 | 用药安全与饮食养生科普网
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('errorMessage').style.display = 'block';
});
</script>
</body>
</html>
